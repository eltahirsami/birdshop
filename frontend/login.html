<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <style>
    body { font-family: Tahoma; direction: rtl; background:#f4f4f4 }
    .box {
      width:300px; margin:100px auto; padding:20px;
      background:#fff; border-radius:6px;
    }
    input, button {
      width:100%; margin:8px 0; padding:8px;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>🔐 تسجيل الدخول</h3>

  <input id="username" placeholder="اسم المستخدم">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>

  <p id="msg"></p>
</div>

<script>
function login() {
  fetch('/login', {
    method: 'POST',
    credentials: 'include', // ✅ مهم
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      password: password.value
    })
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) {
      msg.innerText = d.error;
    } else {
      // 👇 هنا التصحيح
      location.href = '/';
    }
  });
}
</script>

</body>
</html>
