<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  body { background:#0a0e1a; color:#00d4ff; font-family:Tahoma; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; flex-direction:column; gap:20px; }
  h1 { font-size:28px; }
  p { color:#64748b; font-size:14px; }
  .dot { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>
  <h1>🦜 SKY BIRD</h1>
  <p class="dot">جاري تشغيل البرنامج...</p>
</body>
</html>
